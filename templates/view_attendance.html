<!DOCTYPE html>
<html>
<head>
    <title>Attendance Records</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container mt-5">
    <div class="card records-card p-5">
        <h2 class="text-center mb-4 records-title">📊 Attendance Records</h2>

        <div class="table-container">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% if records %}
                        {% for r in records %}
                        <tr>
                            <td><strong>{{ r[0] }}</strong></td>
                            <td>{{ r[1] }}</td>
                            <td>{{ r[2] }}</td>
                            <td><span class="badge bg-success">{{ r[3] }}</span></td>
                        </tr>
                        {% endfor %}
                    {% else %}
                        <tr>
                            <td colspan="4" class="empty-state">
                                No attendance records found
                            </td>
                        </tr>
                    {% endif %}
                </tbody>
            </table>
        </div>

        <a href="/dashboard" class="btn btn-back mt-4">⬅ Back to Dashboard</a>
    </div>
</div>

</body>
</html>
