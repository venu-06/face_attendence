<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="d-flex align-items-center justify-content-center">

<div class="card register-card p-5" style="width: 420px;">
    <h2 class="text-center mb-4 register-header">📝 Student Registration</h2>

    <form method="POST" action="/register">

        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" name="name" class="form-control" placeholder="Enter your full name" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" placeholder="your.email@example.com" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Create a strong password" required>
        </div>

        <button type="submit" class="btn btn-register w-100">
            Register
        </button>
    </form>

    <a href="/" class="login-link text-center mt-3 d-block">Already have an account? Login</a>

    {% if error %}
    <div class="alert alert-danger alert-custom mt-3">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}
</div>

</body>
</html>
