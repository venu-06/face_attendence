<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center">

<div class="card login-card p-5" style="width: 400px;">
    <h2 class="text-center mb-4 login-header">🔐 Login</h2>

    <form method="POST">
        <input class="form-control mb-3" name="email" placeholder="Email address" required>
        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>

        <button class="btn btn-login w-100">Login</button>
    </form>

    <a href="/register" class="register-link text-center mt-3 d-block">Don't have an account? Register</a>

    {% if error %}
    <div class="alert alert-danger alert-custom mt-3">
        <strong>Error:</strong> {{ error }}
    </div>
    {% endif %}
</div>

</body>
</html>
